name: ctfind-production-control-contlin

services:
  postgres:
    image: postgres:16-alpine
    container_name: ctfind-contlin-postgres
    environment:
      POSTGRES_DB: ctfind_contlin
      POSTGRES_USER: ctfind
      POSTGRES_PASSWORD: ctfind
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctfind -d ctfind_contlin"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ctfind-local

  app:
    image: ctfind-production-control-contlin:local
    container_name: ctfind-contlin-app
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ctfind_contlin
      SPRING_DATASOURCE_USERNAME: ctfind
      SPRING_DATASOURCE_PASSWORD: ctfind
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ctfind-local

  frontend:
    image: ctfind-production-control-cabinet:local
    container_name: ctfind-contlin-frontend
    build:
      context: ./frontend/cabinet
      dockerfile: Dockerfile
      network: host
    depends_on:
      app:
        condition: service_healthy
    environment:
      CABINET_API_HOST: http://app:8080
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/cabinet/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ctfind-local

networks:
  ctfind-local:
    name: ctfind-contlin-local

volumes:
  postgres-data:
    name: ctfind-contlin-postgres-data
